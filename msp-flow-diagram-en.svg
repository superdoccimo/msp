<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">MSP Protocol Detailed Flow</text>
  
  <!-- Client Side Processing -->
  <g transform="translate(50, 70)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold">Client Processing</text>
    
    <rect x="0" y="20" width="300" height="450" fill="#f0f8ff" stroke="#333" rx="10" ry="10" />
    
    <!-- Flowchart -->
    <rect x="75" y="50" width="150" height="50" fill="#c2e0ff" stroke="#333" rx="5" ry="5" />
    <text x="150" y="80" font-family="Arial" font-size="14" text-anchor="middle">Initialize</text>
    
    <line x1="150" y1="100" x2="150" y2="120" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,120 145,110 155,110" fill="#333" />
    
    <rect x="75" y="120" width="150" height="50" fill="#c2e0ff" stroke="#333" rx="5" ry="5" />
    <text x="150" y="145" font-family="Arial" font-size="14" text-anchor="middle">Connect to Server</text>
    
    <line x1="150" y1="170" x2="150" y2="190" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,190 145,180 155,180" fill="#333" />
    
    <rect x="50" y="190" width="200" height="60" fill="#c2e0ff" stroke="#333" rx="5" ry="5" />
    <text x="150" y="215" font-family="Arial" font-size="14" text-anchor="middle">Create Data Packet</text>
    <text x="150" y="235" font-family="Arial" font-size="12" text-anchor="middle">build_packet(TYPE_DATA, message)</text>
    
    <line x1="150" y1="250" x2="150" y2="270" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,270 145,260 155,260" fill="#333" />
    
    <rect x="75" y="270" width="150" height="50" fill="#c2e0ff" stroke="#333" rx="5" ry="5" />
    <text x="150" y="295" font-family="Arial" font-size="14" text-anchor="middle">Send Packet</text>
    
    <line x1="150" y1="320" x2="150" y2="340" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,340 145,330 155,330" fill="#333" />
    
    <rect x="50" y="340" width="200" height="60" fill="#c2e0ff" stroke="#333" rx="5" ry="5" />
    <text x="150" y="365" font-family="Arial" font-size="14" text-anchor="middle">Receive &amp; Parse Response</text>
    <text x="150" y="385" font-family="Arial" font-size="12" text-anchor="middle">parse_packet(response)</text>
    
    <line x1="150" y1="400" x2="150" y2="420" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,420 145,410 155,410" fill="#333" />
    
    <rect x="75" y="420" width="150" height="30" fill="#c2e0ff" stroke="#333" rx="5" ry="5" />
    <text x="150" y="440" font-family="Arial" font-size="14" text-anchor="middle">Terminate</text>
  </g>
  
  <!-- Server Side Processing -->
  <g transform="translate(450, 70)">
    <text x="0" y="0" font-family="Arial" font-size="18" font-weight="bold">Server Processing</text>
    
    <rect x="0" y="20" width="300" height="450" fill="#f0fff0" stroke="#333" rx="10" ry="10" />
    
    <!-- Flowchart -->
    <rect x="75" y="50" width="150" height="50" fill="#d6f5d6" stroke="#333" rx="5" ry="5" />
    <text x="150" y="80" font-family="Arial" font-size="14" text-anchor="middle">Initialize</text>
    
    <line x1="150" y1="100" x2="150" y2="120" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,120 145,110 155,110" fill="#333" />
    
    <rect x="75" y="120" width="150" height="50" fill="#d6f5d6" stroke="#333" rx="5" ry="5" />
    <text x="150" y="145" font-family="Arial" font-size="14" text-anchor="middle">Bind Socket &amp; Listen</text>
    
    <line x1="150" y1="170" x2="150" y2="190" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,190 145,180 155,180" fill="#333" />
    
    <path d="M 150,190 A 20,20 0 1 1 149.9,190.1" fill="#fff2cc" stroke="#333" />
    <text x="150" y="195" font-family="Arial" font-size="14" text-anchor="middle">Wait for Connection</text>
    
    <line x1="150" y1="210" x2="150" y2="230" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,230 145,220 155,220" fill="#333" />
    
    <rect x="50" y="230" width="200" height="40" fill="#d6f5d6" stroke="#333" rx="5" ry="5" />
    <text x="150" y="255" font-family="Arial" font-size="14" text-anchor="middle">Accept Client Connection</text>
    
    <line x1="150" y1="270" x2="150" y2="290" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,290 145,280 155,280" fill="#333" />
    
    <rect x="50" y="290" width="200" height="60" fill="#d6f5d6" stroke="#333" rx="5" ry="5" />
    <text x="150" y="315" font-family="Arial" font-size="14" text-anchor="middle">Receive &amp; Parse Packet</text>
    <text x="150" y="335" font-family="Arial" font-size="12" text-anchor="middle">parse_packet(data)</text>
    
    <line x1="150" y1="350" x2="150" y2="370" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="150,370 145,360 155,360" fill="#333" />
    
    <rect x="50" y="370" width="200" height="60" fill="#d6f5d6" stroke="#333" rx="5" ry="5" />
    <text x="150" y="395" font-family="Arial" font-size="14" text-anchor="middle">Create &amp; Send ACK Packet</text>
    <text x="150" y="415" font-family="Arial" font-size="12" text-anchor="middle">build_packet(TYPE_ACK, 'OK')</text>
    
    <line x1="250" y1="340" x2="270" y2="340" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <line x1="270" y1="340" x2="270" y2="195" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <line x1="270" y1="195" x2="170" y2="195" stroke="#333" stroke-width="2" stroke-dasharray="none" />
    <polygon points="170,195 180,190 180,200" fill="#333" />
  </g>
  
  <!-- Communication Flow Arrows -->
  <g transform="translate(350, 225)">
    <line x1="0" y1="50" x2="100" y2="50" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="none" />
    <polygon points="100,50 90,45 90,55" fill="#ff6b6b" />
    <text x="50" y="40" font-family="Arial" font-size="12" text-anchor="middle" fill="#ff6b6b">Send Data</text>
    
    <line x1="100" y1="150" x2="0" y2="150" stroke="#4dabf7" stroke-width="2" stroke-dasharray="none" />
    <polygon points="0,150 10,145 10,155" fill="#4dabf7" />
    <text x="50" y="140" font-family="Arial" font-size="12" text-anchor="middle" fill="#4dabf7">ACK Response</text>
  </g>
  
  <!-- Protocol Information -->
  <g transform="translate(50, 530)">
    <text x="0" y="0" font-family="Arial" font-size="16" font-weight="bold">Protocol Constants:</text>
    <text x="0" y="25" font-family="Arial" font-size="14">• SYNC: 0xAA55</text>
    <text x="0" y="50" font-family="Arial" font-size="14">• VERSION: 1</text>
    <text x="200" y="25" font-family="Arial" font-size="14">• TYPE_DATA: 0x10</text>
    <text x="200" y="50" font-family="Arial" font-size="14">• TYPE_ACK: 0x11</text>
    <text x="400" y="25" font-family="Arial" font-size="14">• Default Port: 9009</text>
  </g>
</svg>